name: ClimateOS idea
description: Propose a ClimateOS idea inspired by the Living Book.
title: "[ClimateOS idea]: "
labels: ["idea", "climateos"]
body:
  - type: input
    id: language
    attributes:
      label: Language
      placeholder: "zh, en, es, fr, de, ar"
    validations:
      required: true
  - type: input
    id: chapter_or_page_url
    attributes:
      label: Chapter or page URL
      description: Link to the related reading context if any.
    validations:
      required: false
  - type: textarea
    id: suggestion
    attributes:
      label: Suggestion / feedback
      description: Describe the idea, question, or possible ClimateOS extension.
    validations:
      required: true
  - type: input
    id: contributor_name
    attributes:
      label: Contributor name optional
  - type: input
    id: country_region
    attributes:
      label: Country / region optional
